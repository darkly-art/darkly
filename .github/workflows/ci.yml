name: CI

on:
  pull_request:
  push:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --exclude darkly-wasm -- -D warnings

  clippy-wasm:
    name: clippy (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p darkly-wasm --target wasm32-unknown-unknown --all-targets -- -D warnings

  test:
    name: cargo test + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Mesa Vulkan software renderer (lavapipe)
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools libvulkan1
          vulkaninfo --summary || true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: cargo llvm-cov
        env:
          WGPU_BACKEND: vulkan
        run: cargo llvm-cov --workspace --exclude darkly-wasm --lcov --output-path lcov.info -- --test-threads=1
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          flags: rust

  wasm-build:
    name: wasm-pack build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest
      - name: wasm-pack build (release)
        working-directory: frontend/wasm
        run: wasm-pack build --release --target web --out-dir pkg

  frontend:
    name: frontend typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest
      - name: npm ci
        working-directory: frontend
        run: npm ci
      - name: wasm:build
        working-directory: frontend
        # Run before vitest so test files that transitively import the
        # config store (which loads `wasm/pkg/darkly_wasm`) can resolve.
        # `npm run build` would also rebuild the pkg, but doing it once
        # explicitly here keeps the test step independent.
        run: npm run wasm:build
      - name: vitest
        working-directory: frontend
        run: npm test
      - name: vite build (includes svelte-check via tsc)
        working-directory: frontend
        run: npm run build
